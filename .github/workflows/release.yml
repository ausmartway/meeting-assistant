name: Release

# Build the ad-hoc-signed DMG and publish it to a GitHub Release.
#
# Works TODAY with no Apple Developer ID: the produced DMG is ad-hoc signed, so
# users open it once with right-click → Open to clear Gatekeeper. When you later
# get a Developer ID cert, add the signing + notarization steps marked below and
# the same workflow ships a clean-opening, notarized DMG.
on:
  push:
    tags:
      - "v*"            # e.g. `git tag v0.1.0 && git push --tags`
  workflow_dispatch: {}  # also runnable by hand from the Actions tab (build only)

permissions:
  contents: write        # needed to create the Release and upload the DMG

env:
  # upload-artifact@v5 still bundles Node 20; run all JS actions on Node 24 to
  # clear the deprecation warning (this becomes the default on 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    # macos-15 ships Xcode 16 (macOS 15 SDK). WhisperKit needs it: it references
    # CoreML's MLState (macOS 15 SDK) and Swift 6's @retroactive, which the older
    # Xcode on macos-14 lacks. Deployment target stays macOS 14 — building against
    # a newer SDK is fine.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select newest Xcode and show toolchain
        run: |
          # Pick the highest installed Xcode (full toolchain, not Command Line
          # Tools) so the WhisperKit Metal/CoreML build succeeds.
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          sudo xcode-select -s "${XCODE:-/Applications/Xcode.app}"
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: swift test

      - name: Import code-signing certificate
        # Import the stable self-signed cert (shared with local builds) into a
        # throwaway keychain so the DMG is signed with the SAME identity every
        # time — which is what lets macOS keep TCC permission grants across
        # updates. Falls back to ad-hoc if the secret isn't configured.
        env:
          CODESIGN_P12_BASE64: ${{ secrets.CODESIGN_P12_BASE64 }}
          CODESIGN_P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          if [ -z "$CODESIGN_P12_BASE64" ]; then
            echo "No signing cert configured — build will be ad-hoc signed."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/codesign.keychain-db"
          KCPASS="$(openssl rand -hex 24)"
          echo "$CODESIGN_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CODESIGN_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
          # Add to the search list so codesign can resolve the identity.
          security list-keychains -d user -s \
            $(security list-keychains -d user | tr -d '"' | xargs) "$KEYCHAIN"
          HASH="$(security find-identity -p codesigning "$KEYCHAIN" \
                    | awk '/Meeting Assistant Self-Signed/ {print $2; exit}')"
          echo "CODESIGN_IDENTITY=$HASH" >> "$GITHUB_ENV"
          echo "CODESIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported signing identity $HASH"

      - name: Build DMG
        # build-app.sh picks up CODESIGN_IDENTITY/CODESIGN_KEYCHAIN from the env.
        run: |
          chmod +x Scripts/*.sh
          ./Scripts/make-dmg.sh

      # --- Notarization (add when you have an Apple Developer ID) --------------
      # Self-signed builds are not notarized, so first launch still needs
      # System Settings → Privacy & Security → Open Anyway. With a Developer ID:
      #     xcrun notarytool submit build/MeetingAssistant.dmg \
      #       --apple-id "$APPLE_ID" --team-id "$TEAM_ID" \
      #       --password "$APP_SPECIFIC_PASSWORD" --wait
      #     xcrun stapler staple build/MeetingAssistant.dmg
      # -----------------------------------------------------------------------

      - name: Upload DMG as a build artifact
        # Always available (including manual runs) so you can grab the build even
        # when it isn't a tagged release.
        uses: actions/upload-artifact@v5
        with:
          name: MeetingAssistant-dmg
          path: build/MeetingAssistant.dmg

      - name: Publish GitHub Release
        # Only on tag pushes — attaches the DMG to a Release named after the tag.
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="## Install

          1. Download \`MeetingAssistant.dmg\` below and open it.
          2. Drag **Meeting Assistant** onto **Applications**.
          3. Double-click the app. This build is self-distributed (not notarized),
             so macOS blocks the first launch. To allow it (first time only):
             - **macOS 15 / 26:** open **System Settings → Privacy & Security**,
               scroll to **Security**, click **Open Anyway**, authenticate, then
               **Open Anyway** again. (Apple removed the right-click → Open button.)
             - **macOS 14:** **right-click the app → Open**, then click **Open**.

          The app lives in your menu bar and walks you through setup on first launch."

          # Create the release if it's new; otherwise just (re)attach the DMG.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" build/MeetingAssistant.dmg --clobber
          else
            gh release create "$GITHUB_REF_NAME" build/MeetingAssistant.dmg \
              --title "Meeting Assistant $GITHUB_REF_NAME" \
              --notes "$NOTES"
          fi
